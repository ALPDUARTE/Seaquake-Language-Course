name: Gerar APK e Atualizar Firebase

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Configurar Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    # Mudamos para assembleDebug para evitar erros de falta de chave de assinatura (JKS) no GitHub
    - name: Compilar APK
      run: ./gradlew assembleDebug

    - name: Publicar no GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: app/build/outputs/apk/debug
        branch: gh-pages

    - name: Instalar Firebase CLI
      run: npm install -g firebase-tools

    - name: Atualizar Versão no Firebase Remote Config
      env:
        FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      run: |
        # Cria o arquivo de credenciais temporário
        echo "$FIREBASE_SERVICE_ACCOUNT" > service-account.json
        export GOOGLE_APPLICATION_CREDENTIALS=service-account.json
        
        # Obtém o versionCode atual do arquivo version.properties
        VERSION_CODE=$(grep 'VERSION_CODE' app/version.properties | cut -d'=' -f2)
        
        # Gera o JSON final do Remote Config baseado no template e no VERSION_CODE
        sed "s/\"value\": \"1\"/\"value\": \"$VERSION_CODE\"/" firebase-config-template.json > remote-config.json
        
        # Faz o deploy para o Firebase
        firebase remoteconfig:push remote-config.json
        
        # Limpeza
        rm service-account.json
